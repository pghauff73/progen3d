name: progen3d
version: "0.96d-4"
summary: Grammar-based 3D procedural generator
description: |
  Progen3d is a grammar-driven procedural modeling tool with a Dear ImGui
  editor, live OpenGL preview, texture management, and PLY export.
base: core22
grade: stable
confinement: strict

architectures:
  - build-on: [amd64]

parts:
  imgui-source:
    plugin: dump
    source: https://github.com/ocornut/imgui.git
    source-type: git
    source-tag: v1.90.1
    organize:
      "*": imgui/
    prime:
      - -*

  progen3d:
    plugin: nil
    source: .
    after:
      - imgui-source
    build-packages:
      - build-essential
      - g++
      - make
      - libepoxy-dev
      - libgl1-mesa-dev
      - libglu1-mesa-dev
      - libglm-dev
    stage-packages:
      - fonts-dejavu-core
      - libepoxy0
      - libfontconfig1
      - libfreetype6
      - libgl1
      - libglu1-mesa
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libx11-6
      - libxcursor1
      - libxext6
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxkbcommon0
      - libxrandr2
    override-build: |
      set -eu
      make clean
      make \
        IMGUI_CORE_DIR="$CRAFT_STAGE/imgui" \
        IMGUI_BACKEND_DIR="$CRAFT_STAGE/imgui/backends" \
        IMGUI_INCLUDE_DIR="$CRAFT_STAGE/imgui" \
        IMGUI_BACKEND_INCLUDE_DIR="$CRAFT_STAGE/imgui/backends"

      mkdir -p "$CRAFT_PART_INSTALL/snap/local"
      mkdir -p "$CRAFT_PART_INSTALL/snap/gui"
      mkdir -p "$CRAFT_PART_INSTALL/third_party/debs"

      cp progen3d "$CRAFT_PART_INSTALL/progen3d"
      cp -r snap/gui "$CRAFT_PART_INSTALL/snap/"
      cp p3dicon.png "$CRAFT_PART_INSTALL/snap/gui/progen3d.png"
      cp snap/local/launcher.sh "$CRAFT_PART_INSTALL/snap/local/launcher.sh"
      chmod +x "$CRAFT_PART_INSTALL/snap/local/launcher.sh"

      cp -r textures "$CRAFT_PART_INSTALL/textures"
      cp ./*.grammar "$CRAFT_PART_INSTALL/"
      cp -r third_party/debs/glfw "$CRAFT_PART_INSTALL/third_party/debs/"

apps:
  progen3d:
    command: snap/local/launcher.sh
    desktop: snap/gui/progen3d.desktop
    common-id: com.github.pghauff55.ProGen3d
    plugs:
      - desktop
      - desktop-legacy
      - home
      - opengl
      - wayland
      - x11
